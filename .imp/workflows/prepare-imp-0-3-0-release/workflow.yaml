schema: imp.workflow/v1
id: prepare-imp-0-3-0-release
title: Prepare imp 0.3.0 release candidate
status: done_with_concerns
kind: release
settings:
  worktree: current
  strictness: hard
  commit: with_code_changes
  durable: true
  disposable: false
  commit_traces: false
spec:
  goal: |
    Prepare imp for a hardened 0.3.0 stable release candidate that is repository-ready for a Hacker News launch. The workflow focuses on codebase/release readiness only, not drafting the HN post.
  user_value: |
    Make imp credible for a public developer audience: a clear supported product surface, less dead or stale code, reliable install/run instructions, provider/auth paths that work for Anthropic and OpenAI-compatible users, and release artifacts that make 0.3.0 feel intentional rather than experimental.

    Cleanup policy: archive only clearly unused/dead code and stale docs to ~/imp-archive. Do not archive merely experimental but still-live features unless the audit proves they are dead, stale, misleading, or blocking release clarity.

    Product surface policy: decide the supported 0.3.0 public surface from audit evidence. ACP/editor integration is out of scope unless it is already polished and documented; do not promise blocked or half-supported editor integration.
  non_goals:
  - Write the Hacker News launch post or comment-response material.
  - Create the final git tag without explicit user approval after release-candidate verification.
  - Remove or archive live features only because they are experimental; require evidence that they are dead, stale, misleading, or release-blocking.
  - Add major new product features beyond release-readiness fixes required by audit evidence.
  - Perform destructive git history changes, network pushes, or publish artifacts without explicit approval.
  acceptance:
    audit_complete:
      text: A full repository audit identifies dead code, stale docs, unnecessary or misleading features, release blockers, provider/auth risks, and docs/install gaps.
      status: todo
      checks:
      - surface_audit_complete
      - dead_code_inventory_complete
      - stale_docs_inventory_complete
      - surface_audit_complete
      - provider_auth_audit_complete
      - dependency_security_audit_complete
    cleanup_complete:
      text: Clearly unused/dead code and stale docs are removed from the active repo or moved to ~/imp-archive with a manifest, and no supported 0.3.0 surface is accidentally broken.
      status: todo
      checks:
      - archive_root_ready
      - archive_manifest_written
      - dead_code_disposition_complete
      - stale_docs_disposition_complete
      - no_accidental_public_surface_loss
    release_candidate_ready:
      text: Cargo versions, changelog/release notes, README/install docs, and release checklist consistently describe imp 0.3.0 RC readiness.
      status: todo
      checks:
      - cargo_versions_bumped
      - changelog_updated
      - readme_install_docs_verified
      - release_checklist_written
      - acp_scope_documented
    automated_verification_passed:
      text: 'Automated evidence only is sufficient: cargo checks/tests, audits, docs grep, and CLI smoke tests pass or have documented blockers.'
      status: todo
      checks:
      - cargo_fmt_passed
      - cargo_check_workspace_passed
      - targeted_tests_passed
      - cli_smoke_tests_passed
      - docs_grep_passed
      - audit_scans_passed
    final_decision_ready:
      text: The workflow produces a concise go/no-go summary with remaining risks and an explicit final tag approval prompt.
      status: todo
      checks:
      - results_rendered
      - go_no_go_summary_written
      - final_tag_approval_pending
  approval_required_for:
  - final git tag creation for v0.3.0
  - publishing or pushing to any non-local/network remote
  - removing provider/auth support
  - removing workflow runtime/tool support
  - archiving live but experimental features without clear dead/stale evidence
  - deleting files permanently instead of archiving when they contain nontrivial design/history
  - large refactors touching more than five files
context:
  project_instructions:
    file: AGENTS.md
    status: todo
  prior_surface_cleanup:
    artifact: .imp/workflows/tighten-imp-product-surface/results.md
    status: todo
  archive_root:
    artifact: ~/imp-archive
    status: todo
  current_version_sources:
    artifact: Cargo.toml files, Cargo.lock, README/install docs, CLI version output
    status: todo
  release_scope_answers:
    artifact: chat on 2026-05-29; decisions captured in spec.user_value and non_goals
    status: done
steps:
  inspect_instructions_and_status:
    kind: context
    status: done
    checks:
    - project_instructions_read
    - git_status_reviewed
    - workflow_schema_validated_initially
  inventory_release_surface:
    kind: context
    status: done
    depends_on:
    - inspect_instructions_and_status
    checks:
    - cli_surface_inventory_complete
    - tui_surface_inventory_complete
    - workflow_surface_inventory_complete
    - lua_extension_surface_inventory_complete
    - provider_surface_inventory_complete
    - acp_surface_inventory_complete
    - gui_surface_inventory_complete
    - docs_surface_inventory_complete
  audit_dead_code_and_stale_assets:
    kind: context
    status: done
    depends_on:
    - inventory_release_surface
    checks:
    - cargo_unused_feature_audit_complete
    - symbol_reference_audit_complete
    - stale_docs_inventory_complete
    - orphaned_tests_inventory_complete
    - archive_candidates_classified
  audit_quality_security_dependencies:
    kind: context
    status: done
    depends_on:
    - inventory_release_surface
    checks:
    - audit_scan_quality_complete
    - audit_scan_security_complete
    - audit_scan_secrets_complete
    - audit_scan_deps_complete
    - blocker_findings_classified
  audit_provider_auth_and_smoke_paths:
    kind: context
    status: done
    depends_on:
    - inventory_release_surface
    checks:
    - anthropic_auth_path_audited
    - openai_compatible_auth_path_audited
    - provider_error_messages_audited
    - headless_cli_smoke_plan_written
  decide_0_3_0_supported_surface:
    kind: plan
    status: done
    depends_on:
    - audit_dead_code_and_stale_assets
    - audit_quality_security_dependencies
    - audit_provider_auth_and_smoke_paths
    checks:
    - supported_surface_documented
    - out_of_scope_surface_documented
    - acp_scope_documented
    - removal_archive_policy_applied
  plan_cleanup_and_release_fixes:
    kind: plan
    status: done
    depends_on:
    - decide_0_3_0_supported_surface
    checks:
    - dead_code_cut_plan_written
    - stale_docs_cut_plan_written
    - release_blocker_fix_plan_written
    - verification_plan_written
  archive_dead_code_and_stale_docs:
    kind: build
    status: done
    depends_on:
    - plan_cleanup_and_release_fixes
    checks:
    - archive_root_ready
    - files_moved_to_archive_when_needed
    - archive_manifest_written
    - repo_references_updated_after_archival
  implement_release_blocker_fixes:
    kind: build
    status: done_with_concerns
    depends_on:
    - plan_cleanup_and_release_fixes
    checks:
    - provider_auth_blockers_fixed
    - cli_smoke_blockers_fixed
    - docs_blockers_fixed
    - compile_blockers_fixed
  bump_versions_to_0_3_0_rc:
    kind: build
    status: done
    depends_on:
    - implement_release_blocker_fixes
    checks:
    - cargo_versions_bumped
    - cargo_lock_updated
    - cli_version_output_checked
  update_release_docs:
    kind: build
    status: done
    depends_on:
    - bump_versions_to_0_3_0_rc
    checks:
    - changelog_updated
    - readme_install_docs_verified
    - supported_surface_docs_updated
    - release_checklist_written
    - local_tag_checklist_written
  run_automated_verification:
    kind: verify
    status: done_with_concerns
    depends_on:
    - archive_dead_code_and_stale_docs
    - update_release_docs
    checks:
    - cargo_fmt_passed
    - cargo_check_workspace_passed
    - targeted_tests_passed
    - cli_smoke_tests_passed
    - docs_grep_passed
    - audit_scans_passed
    - git_diff_check_passed
  review_release_candidate:
    kind: closeout
    status: done_with_concerns
    depends_on:
    - run_automated_verification
    checks:
    - focused_diff_reviewed
    - go_no_go_summary_written
    - final_tag_approval_pending
    - results_rendered
checks:
  project_instructions_read:
