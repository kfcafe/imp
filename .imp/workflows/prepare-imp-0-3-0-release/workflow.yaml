    kind: approval
    status: passed
    decision: Ask user before creating final v0.3.0 git tag.
  results_rendered:
    kind: artifact
    status: passed
    path: .imp/workflows/prepare-imp-0-3-0-release/results.md
workers:
  auditor:
    role: auditor
    writes_code: false
    responsibilities:
    - inventory current release surface across CLI, TUI, workflows, Lua extensions, providers, ACP, GUI, and docs
    - identify dead code, stale docs, orphaned tests, misleading feature promises, dependency/security findings, and provider/auth risks
    - produce evidence-backed archive candidates without over-removing live experimental code
  planner:
    role: planner
    writes_code: false
    responsibilities:
    - decide supported 0.3.0 surface from audit evidence
    - classify out-of-scope features, especially ACP/editor integration unless polished and documented
    - write cleanup, release-blocker, and verification plans
  implementer:
    role: implementer
    writes_code: true
    responsibilities:
    - archive clearly unused/dead code and stale docs to ~/imp-archive with manifest
    - fix release blockers surfaced by the audit
    - bump versions to 0.3.0 RC and update changelog/install/support docs
  verifier:
    role: verifier
    writes_code: false
    responsibilities:
    - 'run automated verification only: cargo format/check/test, audit scans, docs grep, CLI smoke tests, and git diff checks'
    - write final go/no-go summary and ask for explicit final tag approval
results:
  path: .imp/workflows/prepare-imp-0-3-0-release/results.md
  required_claims:
  - audit findings and cleanup decisions are evidence-backed
  - archived files are recoverable under ~/imp-archive with a manifest
  - supported 0.3.0 public surface is documented
  - provider/auth readiness for Anthropic and OpenAI-compatible flows is verified or blocked with evidence
  - versions/changelog/install docs/release checklist are ready for 0.3.0 RC
  - automated verification commands and outcomes are recorded
  - final git tag is pending explicit user approval
closeout:
  done:
    requires:
    - surface_audit_complete
    - dead_code_disposition_complete
    - stale_docs_disposition_complete
    - cargo_versions_bumped
    - changelog_updated
    - cargo_check_workspace_passed
    - results_rendered
  allowed_terminal_statuses:
  - done
  - done_with_concerns
  - blocked
  - needs_context
