  cli_smoke_tests_passed:
    kind: command
    status: passed
    command: automated CLI smoke commands from artifacts/verification-plan.md
  docs_grep_passed:
    kind: command
    status: passed
    command: rg checks for stale version, removed commands, blocked ACP promises, and stale install instructions
  audit_scans_passed:
    kind: aggregate
    status: failed
    requires:
    - audit_scan_quality_complete
    - audit_scan_security_complete
    - audit_scan_secrets_complete
    - audit_scan_deps_complete
