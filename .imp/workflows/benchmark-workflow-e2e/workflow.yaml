schema: imp.workflow/v1
id: benchmark-workflow-e2e
title: Benchmark workflow end-to-end
status: done_with_concerns
kind: benchmark
parent:
  workflow: prototype-imp-workflow-engine
  step: benchmark_e2e
settings:
  worktree: current
  strictness: hard
  durable: true
  disposable: false
  commit_traces: false
spec:
  goal: |
    Prove imp-native workflows complete a full lifecycle through the native workflow tool and engine: validate, run, update, append events, verify, review, closeout, and final status reporting.
  user_value: |
    Give the workflow engine a concrete dogfood acceptance test before considering the core workflow prototype complete or building API/app surfaces on top of it.
  non_goals:
  - Add new workflow engine features beyond what the benchmark exposes as necessary.
  - Build the workflow HTTP/API surface.
  - Depend on external services or network access.
  acceptance:
    workflow_validates:
      text: Benchmark workflow validates through the native workflow validator before and after execution.
      status: done
      checks:
      - initial_validation_passed
      - final_validation_passed
    run_engine_selects_expected_steps:
      text: workflow run returns the expected next action as steps advance through the lifecycle.
      status: done
      checks:
      - run_sequence_verified
    updates_append_events:
      text: workflow update safely mutates status fields and appends event records.
      status: done
      checks:
      - event_log_verified
    verify_gate_enforced:
      text: Workflow closeout is not considered complete until verification check passes.
      status: done
      checks:
      - verify_gate_observed
    negative_case_safe:
      text: Invalid update attempts fail without corrupting workflow state.
      status: done
      checks:
      - negative_case_verified
    final_status_done:
      text: Workflow reaches done with results.md written and final status reported correctly.
      status: done
      checks:
      - results_rendered
      - required_checks_passed
  approval_required_for:
  - changing spec.goal
  - removing or weakening spec.acceptance
  - removing required checks
context:
  project_instructions:
    file: AGENTS.md
    status: todo
  workflow_engine_parent:
    file: .imp/workflows/prototype-imp-workflow-engine/workflow.yaml
    status: todo
  workflow_tool_code:
    search: workflow tool implementation and tests
    status: todo
steps:
  context:
    kind: context
    status: done
    checks:
    - project_instructions_loaded
    - workflow_tool_surface_inspected
  plan_benchmark:
    kind: plan
    status: done
    depends_on:
    - context
    checks:
    - benchmark_plan_written
  prepare_fixture:
    kind: build
    status: done
    depends_on:
    - plan_benchmark
    checks:
    - fixture_created
  validate_initial_state:
    kind: verify
    status: done
    depends_on:
    - prepare_fixture
    checks:
    - initial_validation_passed
  exercise_run_and_update:
    kind: verify
    status: done
    depends_on:
    - validate_initial_state
    checks:
    - run_sequence_verified
    - event_log_verified
  exercise_negative_case:
    kind: verify
    status: done
    depends_on:
    - exercise_run_and_update
    checks:
    - negative_case_verified
  verify_closeout_gate:
    kind: verify
    status: done
    depends_on:
    - exercise_negative_case
    checks:
    - verify_gate_observed
    - final_validation_passed
  review:
    kind: review
    status: done_with_concerns
    worker: reviewer
    depends_on:
    - verify_closeout_gate
    checks:
    - results_rendered
    - final_claims_validated
  closeout:
    kind: closeout
    status: done_with_concerns
    depends_on:
    - review
    checks:
    - required_checks_passed
prototypes: {}
checks:
  project_instructions_loaded:
    kind: context
    status: passed
    file: AGENTS.md
  workflow_tool_surface_inspected:
    kind: context
    status: passed
  benchmark_plan_written:
    kind: artifact
    status: passed
    path: .imp/workflows/benchmark-workflow-e2e/artifacts/plan.md
  fixture_created:
    kind: artifact
    status: passed
    path: .imp/workflows/benchmark-workflow-e2e/artifacts/fixture.txt
  initial_validation_passed:
    kind: command
    status: passed
    command: workflow validate benchmark-workflow-e2e
  run_sequence_verified:
    kind: command
    status: passed
    command: workflow run benchmark-workflow-e2e at each lifecycle stage
  event_log_verified:
    kind: artifact
    status: passed
    path: .imp/workflows/benchmark-workflow-e2e/events.jsonl
  negative_case_verified:
    kind: command
    status: passed
    command: invalid workflow update attempt fails without mutation
  verify_gate_observed:
    kind: review
    status: passed
  final_validation_passed:
    kind: command
    status: passed
    command: workflow validate benchmark-workflow-e2e
  results_rendered:
    kind: artifact
    status: passed
    path: .imp/workflows/benchmark-workflow-e2e/results.md
  final_claims_validated:
    kind: closeout
    status: passed
  required_checks_passed:
    kind: aggregate
    status: passed
workers:
  parent:
    role: orchestrator
    writes:
    - workflow
    - results
    - docs
    writes_code: false
    responsibilities:
    - run benchmark lifecycle
    - record evidence
    - update parent workflow gate after success
  verifier:
    role: verifier
    writes: []
  reviewer:
    role: reviewer
    writes:
    - review_artifacts
results:
  path: .imp/workflows/benchmark-workflow-e2e/results.md
  required_claims:
  - commands run
  - state transitions observed
  - events appended
  - negative case result
  - closeout status
  - concerns and follow-up work
closeout:
  done:
    requires:
    - required_checks_passed
    - final_claims_validated
  allowed_terminal_statuses:
  - done
  - done_with_concerns
  - blocked
  - needs_context
