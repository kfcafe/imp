workers:
  planner:
    role: orchestrator
    writes:
    - workflow
    - artifacts
    - results
    writes_code: false
  builder:
    role: builder
    writes:
    - code
    - tests
    - docs
    worktree: current
  reviewer:
    role: reviewer
    writes:
    - review_artifacts
    - results
results:
  path: .imp/workflows/acp-live-editor-integration/results.md
  required_claims:
  - real prompt execution behavior
  - streaming event behavior
  - permission and cancellation behavior
  - durable session/load/resume behavior
  - smoke client evidence
  - docs/capabilities truthfulness
  - remaining concerns
closeout:
  done:
    requires:
    - required_checks_passed
    - final_claims_validated
  allowed_terminal_statuses:
  - done
  - done_with_concerns
  - blocked
  - needs_context
