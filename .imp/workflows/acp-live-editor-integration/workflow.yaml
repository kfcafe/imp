    path: .imp/workflows/acp-live-editor-integration/artifacts/live-wiring-plan.md
  session_strategy_written:
    kind: artifact
    status: passed
    path: .imp/workflows/acp-live-editor-integration/artifacts/session-strategy.md
  permission_strategy_written:
    kind: artifact
    status: passed
    path: .imp/workflows/acp-live-editor-integration/artifacts/permission-strategy.md
  real_prompt_test_passed:
    kind: command
    status: passed
  streaming_updates_test_passed:
    kind: command
    status: passed
  event_mapping_reviewed:
    kind: review
    status: passed
  session_persistence_test_passed:
    kind: command
    status: passed
  load_resume_behavior_tested:
    kind: command
    status: passed
  deep_integration_blockers_recorded:
    kind: artifact
    status: passed
    path: .imp/workflows/acp-live-editor-integration/artifacts/deep-integration-blockers.md
  collaborative_design_review_completed:
