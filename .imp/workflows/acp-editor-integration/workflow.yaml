workers:
  planner:
    role: orchestrator
    writes:
    - workflow
    - artifacts
    - results
    writes_code: false
  builder:
    role: builder
    writes:
    - code
    - tests
    - docs
    worktree: workflow
  reviewer:
    role: reviewer
    writes:
    - review_artifacts
    - results
results:
  path: .imp/workflows/acp-editor-integration/results.md
  required_claims:
  - ACP version and client target verified
  - protocol/server entrypoint implemented
  - event, session, workspace, permission, cancellation mappings verified
  - docs and smoke-client evidence recorded
  - remaining compatibility concerns
closeout:
  done:
    requires:
    - required_checks_passed
    - final_claims_validated
  allowed_terminal_statuses:
  - done
  - done_with_concerns
  - blocked
  - needs_context
