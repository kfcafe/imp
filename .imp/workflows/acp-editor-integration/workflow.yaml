  session_model_inspected:
    kind: context
    status: passed
  client_expectations_inspected:
    kind: context
    status: passed
  contract_written:
    kind: artifact
    status: passed
    path: .imp/workflows/acp-editor-integration/artifacts/acp-contract.md
  event_mapping_reviewed:
    kind: review
    status: passed
  session_mapping_written:
    kind: artifact
    status: passed
    path: .imp/workflows/acp-editor-integration/artifacts/session-mapping.md
  implementation_plan_written:
    kind: artifact
    status: passed
    path: .imp/workflows/acp-editor-integration/artifacts/implementation-plan.md
  cli_surface_decided:
    kind: artifact
    status: passed
    path: .imp/workflows/acp-editor-integration/artifacts/cli-surface-decision.md
  module_boundary_reviewed:
    kind: review
    status: passed
  protocol_type_tests_passed:
    kind: command
    status: passed
  server_start_verified:
    kind: command
    status: passed
  init_handshake_verified:
    kind: command
    status: passed
  prompt_stream_test_passed:
    kind: command
    status: passed
  completion_error_test_passed:
    kind: command
    status: passed
  workspace_context_test_passed:
    kind: command
    status: passed
  session_mapping_test_passed:
    kind: command
    status: passed
  resume_behavior_verified:
    kind: command
    status: passed
  ui_request_test_passed:
    kind: command
    status: passed
  policy_denial_test_passed:
    kind: command
    status: passed
  cancel_test_passed:
    kind: command
    status: passed
  followup_test_passed:
    kind: command
    status: passed
  error_ux_reviewed:
    kind: review
    status: passed
  docs_written:
    kind: artifact
    status: passed
    path: docs/acp.md
  smoke_client_demo_recorded:
    kind: artifact
    status: passed
    path: .imp/workflows/acp-editor-integration/artifacts/smoke-client-demo.md
  fmt_passed:
    kind: command
    status: passed
    command: cargo fmt --check
