[workspace]
resolver = "2"
members = [
    "crates/imp-llm",
    "crates/imp-core",
    "crates/imp-work",
    "crates/imp-lua",
    "crates/imp-tui",
    "crates/imp-cli",
]

[workspace.package]
version = "0.1.0"
edition = "2021"
license = "MPL-2.0"

[workspace.dependencies]
serde = { version = "1", features = ["derive"] }
serde_json = "1"
async-trait = "0.1"
thiserror = "2"
tokio = { version = "1", features = ["full"] }
futures-core = "0.3"
futures = "0.3"
uuid = { version = "1", features = ["v4"] }
reqwest = { version = "0.12", features = ["stream", "json"] }
toml = "0.8"
similar = "2"
walkdir = "2"
clap = { version = "4", features = ["derive"] }
ratatui = "0.29"
crossterm = "0.28"
mlua = { version = "0.10", features = ["lua54", "vendored", "async", "send"] }
ignore = "0.4"
rayon = "1"
url = "2"
tree-sitter = "0.26"
tree-sitter-rust = "0.24"
tree-sitter-typescript = "0.23"
tree-sitter-python = "0.25"
tree-sitter-go = "0.25"
tree-sitter-kotlin-ng = "1.1.0"
tree-sitter-bash = "0.25"
tree-sitter-elixir = "0.3"
tree-sitter-ruby = "0.23"
tree-sitter-perl = "1.1"
tree-sitter-lua = "0.5"
tree-sitter-zig = "1.1"
tree-sitter-odin = "1.3"
tree-sitter-swift = "0.7"
tree-sitter-java = "0.23"
tree-sitter-c = "0.24"
tree-sitter-cpp = "0.23"
tree-sitter-c-sharp = "0.23"
tree-sitter-javascript = "0.25"
readability-rust = "0.1"
project-detect = "0.1"
mana-core = "0.3"

imp-llm = { path = "crates/imp-llm" }
imp-core = { path = "crates/imp-core" }
imp-work = { path = "crates/imp-work" }
imp-lua = { path = "crates/imp-lua" }
imp-tui = { path = "crates/imp-tui" }
